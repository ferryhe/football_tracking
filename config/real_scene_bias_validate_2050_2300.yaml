input_video: "./data/raw5760x144020fps.mp4"
output_dir: "./outputs/real_scene_bias_2050_2300"

logging:
  level: "INFO"
  save_debug_jsonl: true

detector:
  model_path: "./weights/football_ball_yolo.pt"
  device: "cuda:0"
  confidence_threshold: 0.24
  image_size: 1280
  use_half: false
  allowed_labels:
    - "sports ball"
    - "ball"

sahi:
  slice_height: 640
  slice_width: 960
  overlap_height_ratio: 0.10
  overlap_width_ratio: 0.10
  perform_standard_pred: false
  postprocess_type: "NMS"
  postprocess_match_metric: "IOS"
  postprocess_match_threshold: 0.50
  verbose: 0

filtering:
  min_confidence: 0.24
  min_width: 8
  max_width: 80
  min_height: 8
  max_height: 80
  min_aspect_ratio: 0.50
  max_aspect_ratio: 1.80
  roi: [100, 300, 5000, 1400]

scene_bias:
  enabled: true
  negative_rois:
    - name: "right_static_false_ball"
      roi: [3090, 644, 3190, 744]
  positive_rois:
    - name: "left_corner"
      roi: [100, 1080, 550, 1400]
      active_states: ["LOST", "PREDICTING"]
      relaxed_filtering:
        min_confidence: 0.18
        min_width: 6
        min_height: 6
      selection_bonus: 0.05
    - name: "right_corner"
      roi: [4550, 1080, 5000, 1400]
      active_states: ["LOST", "PREDICTING"]
      relaxed_filtering:
        min_confidence: 0.18
        min_width: 6
        min_height: 6
      selection_bonus: 0.08
    - name: "left_goal_side"
      roi: [100, 520, 900, 1300]
      active_states: ["LOST", "PREDICTING"]
      relaxed_filtering:
        min_confidence: 0.20
        min_width: 6
        min_height: 6
      selection_bonus: 0.04
    - name: "right_goal_side"
      roi: [4200, 520, 5000, 1300]
      active_states: ["LOST", "PREDICTING"]
      relaxed_filtering:
        min_confidence: 0.20
        min_width: 6
        min_height: 6
      selection_bonus: 0.04

selection:
  min_accept_score: 0.0
  stable_history_length: 12
  weights:
    distance_score: 0.32
    direction_score: 0.20
    velocity_score: 0.18
    acceleration_penalty: 0.14
    trajectory_length_bonus: 0.10
    confidence: 0.06

tracking:
  max_lost_frames: 12
  match_distance: 150.0
  max_speed: 220.0
  max_acceleration: 180.0
  min_history_for_tracking: 3
  history_size: 128
  prediction_mode: "constant_velocity"
  predicted_confidence_decay: 0.90

output:
  video_name: "annotated.mp4"
  frame_dir: "frames"
  csv_name: "ball_track.csv"
  debug_jsonl_name: "debug.jsonl"
  video_codec: "mp4v"
  frame_image_ext: ".jpg"
  save_video: true
  save_frames: false
  save_csv: true
  save_debug_jsonl: true
  draw_radius: 18
  draw_thickness: 4
  frame_text_scale: 1.0
  frame_text_thickness: 2
  draw_status_text: true

runtime:
  use_gpu_if_available: true
  enable_cudnn_benchmark: true
  opencv_threads: 2
  capture_backend: "CAP_FFMPEG"
  start_frame: 2050
  max_frames: 251
