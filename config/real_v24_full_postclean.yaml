input_video: "./data/raw5760x144020fps.mp4"
output_dir: "./outputs/real_v24_full_postclean"

logging:
  level: "INFO"
  save_debug_jsonl: true

detector:
  model_path: "./weights/football_ball_yolo.pt"
  device: "cuda:0"
  confidence_threshold: 0.24
  image_size: 1280
  use_half: false
  allowed_labels:
    - "sports ball"
    - "ball"

sahi:
  slice_height: 640
  slice_width: 960
  batch_size: 6
  overlap_height_ratio: 0.10
  overlap_width_ratio: 0.10
  perform_standard_pred: false
  postprocess_type: "NMS"
  postprocess_match_metric: "IOS"
  postprocess_match_threshold: 0.50
  verbose: 0

filtering:
  min_confidence: 0.24
  min_width: 8
  max_width: 80
  min_height: 8
  max_height: 80
  min_aspect_ratio: 0.50
  max_aspect_ratio: 1.80
  roi: null

scene_bias:
  enabled: true
  ground_zones:
    - name: "main_pitch_ground"
      points:
        - [0, 560]
        - [800, 430]
        - [1700, 350]
        - [2560, 340]
        - [3420, 350]
        - [4320, 420]
        - [5120, 600]
        - [5120, 1440]
        - [0, 1440]
  negative_rois:
    - name: "right_static_false_ball"
      points:
        - [3090, 644]
        - [3190, 644]
        - [3190, 744]
        - [3090, 744]
  positive_rois: []
  dynamic_air_recovery:
    enabled: true
    profile: "fisheye_180_indoor"
    active_states: ["PREDICTING", "LOST"]
    relaxed_filtering:
      min_confidence: 0.18
      min_width: 6
      min_height: 6
    selection_bonus: 0.06
    reacquire_enabled: true
    reacquire_confidence_threshold: 0.10
    reacquire_image_size: 1536
    burst_enabled: true
    burst_frames: 8
    burst_confidence_threshold: 0.05
    burst_image_size: 1920
    burst_window_scale: 1.35
    low_quality_reject_enabled: true
    low_quality_reject_confidence: 0.22
    low_quality_reject_score: 0.30
    low_quality_reject_min_lost_frames: 4
    tentative_reacquire_enabled: true
    tentative_reacquire_min_lost_frames: 4
    tentative_reacquire_confidence_threshold: 0.30
    tentative_reacquire_score_threshold: 0.38
    tentative_reacquire_confirmation_radius: 140.0
    tentative_reacquire_max_age: 1
    gap_aware_jump_gate_enabled: true
    gap_aware_short_lost_frames: 3
    gap_aware_short_jump_distance: 260.0
    gap_aware_long_jump_distance: 520.0
    gap_aware_high_confidence_bypass: 0.42
    edge_reentry_enabled: true
    edge_reentry_min_lost_frames: 2
    edge_reentry_max_lost_frames: 80
    edge_reentry_margin_x_ratio: 0.08
    edge_reentry_margin_y_ratio: 0.08
    edge_reentry_expand_x: 260.0
    edge_reentry_expand_y: 240.0
    edge_reentry_high_confidence_bypass: 0.45
    isolated_far_jump_enabled: false
    true_out_of_view_enabled: false
    ground_exit_enabled: true
    ground_exit_min_lost_frames: 8

selection:
  min_accept_score: 0.0
  stable_history_length: 12
  weights:
    distance_score: 0.32
    direction_score: 0.20
    velocity_score: 0.18
    acceleration_penalty: 0.14
    trajectory_length_bonus: 0.10
    confidence: 0.06

tracking:
  max_lost_frames: 12
  match_distance: 150.0
  max_speed: 220.0
  max_acceleration: 180.0
  min_history_for_tracking: 3
  history_size: 128
  prediction_mode: "constant_velocity"
  predicted_confidence_decay: 0.90
  prediction_velocity_decay: 0.96
  prediction_boundary_extra_decay: 0.85
  prediction_boundary_margin_ratio: 0.08
  kalman_enabled: true
  kalman_model: "ca"
  process_noise_base: 4.0
  process_noise_lost_multiplier: 1.35
  process_noise_reacquire_multiplier: 1.75
  measurement_noise_base: 36.0
  measurement_noise_low_conf_multiplier: 3.0
  gate_sigma_scale: 3.0
  gate_radius_min: 90.0
  gate_radius_max: 260.0
  velocity_blend_after_reacquire: 0.35
  speed_cap_after_reacquire: 180.0
  reacquire_stabilization_frames: 4
  reacquire_stabilization_gate_scale: 0.70
  reacquire_stabilization_velocity_decay: 0.88
  out_of_view_enabled: true
  out_of_view_top_margin_ratio: 0.12
  out_of_view_side_margin_ratio: 0.06
  out_of_view_bottom_margin_ratio: 0.06
  out_of_view_velocity_threshold: 18.0
  out_of_view_prediction_limit: 4
  out_of_view_extra_decay: 0.60

output:
  video_name: "annotated.mp4"
  frame_dir: "frames"
  csv_name: "ball_track.csv"
  debug_jsonl_name: "debug.jsonl"
  video_codec: "mp4v"
  frame_image_ext: ".jpg"
  save_video: false
  save_frames: false
  save_csv: true
  save_debug_jsonl: true
  draw_radius: 18
  draw_thickness: 4
  frame_text_scale: 1.0
  frame_text_thickness: 2
  draw_status_text: true

postprocess:
  enabled: true
  max_detected_island_length: 2
  stable_segment_min_length: 4
  min_jump_distance: 260.0
  nuisance_zone_jump_distance: 160.0
  low_confidence_threshold: 0.40
  save_cleaned_video: true
  save_cleaned_csv: true
  save_cleaned_debug_jsonl: true
  cleaned_video_name: "annotated.cleaned.mp4"
  cleaned_csv_name: "ball_track.cleaned.csv"
  cleaned_debug_jsonl_name: "debug.cleaned.jsonl"
  cleanup_report_name: "cleanup_report.json"
  nuisance_zones:
    - name: "upper_head_nuisance"
      roi: [2000, 620, 2280, 730]
    - name: "left_bottom_spare_ball"
      roi: [0, 1180, 200, 1440]
  protected_ranges: []

follow_cam:
  enabled: true
  prefer_cleaned_track: true
  output_video_name: "follow_cam.mp4"
  camera_path_name: "camera_path.csv"
  report_name: "follow_cam_report.json"
  target_width: 1920
  target_height: 1080
  min_crop_height: 900
  max_crop_height: 1260
  home_center_x_ratio: 0.50
  home_center_y_ratio: 0.66
  ball_screen_x_ratio: 0.50
  ball_screen_y_ratio: 0.58
  dead_zone_ratio_x: 0.12
  dead_zone_ratio_y: 0.10
  pan_smoothing: 0.24
  glide_pan_smoothing: 0.10
  glide_max_pan_per_frame_x: 28.0
  glide_max_pan_per_frame_y: 16.0
  catch_up_pan_smoothing: 0.22
  catch_up_max_pan_per_frame_x: 56.0
  catch_up_max_pan_per_frame_y: 30.0
  catch_up_trigger_ratio_x: 0.28
  catch_up_trigger_ratio_y: 0.24
  catch_up_release_ratio_x: 0.20
  catch_up_release_ratio_y: 0.17
  zoom_smoothing: 0.20
  zoom_in_smoothing: 0.04
  zoom_out_smoothing: 0.06
  max_zoom_in_per_frame: 6.0
  max_zoom_out_per_frame: 14.0
  zoom_deadband_height: 120.0
  zoom_out_confirm_frames: 6
  zoom_in_confirm_frames: 12
  zoom_reverse_confirm_frames: 18
  zoom_hold_frames_after_change: 16
  velocity_smoothing: 0.35
  max_pan_per_frame_x: 90.0
  max_pan_per_frame_y: 55.0
  look_ahead_gain: 0.20
  look_ahead_max_px: 180.0
  speed_zoom_out_start: 22.0
  speed_zoom_out_end: 85.0
  predicted_zoom_out_bonus: 0.12
  lost_zoom_out_bonus: 0.30
  low_confidence_zoom_out_start: 0.40
  low_confidence_zoom_out_end: 0.18
  predicted_pan_decay: 0.55
  lost_hold_frames: 10
  lost_recenter_frames: 28
  recenter_smoothing: 0.08
  draw_ball_marker: true
  draw_frame_text: true

runtime:
  use_gpu_if_available: true
  enable_cudnn_benchmark: true
  opencv_threads: 2
  capture_backend: "CAP_FFMPEG"
  start_frame: 0
  max_frames: null
